<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>同時通訳 AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1f;
    --card: rgba(255,255,255,0.045);
    --card-border: rgba(255,255,255,0.08);
    --purple: #7c6fff;
    --purple-soft: rgba(124,111,255,0.15);
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --dim: #3a3a5a;
    --tgt-bg: rgba(124,111,255,0.07);
    --tgt-border: rgba(124,111,255,0.2);
    --tgt-text: #c4b8ff;
    --red: #ff4466;
  }

  html, body {
    height: 100%;
    background: linear-gradient(160deg, #0d0d1f 0%, #141428 60%, #0f1a2e 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) 14px env(safe-area-inset-bottom, 20px);
    gap: 10px;
    overflow-y: auto;
  }

  /* ── Setup ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 0;
  }
  #setup .globe { font-size: 3rem; margin-bottom: 12px; }
  #setup h1 {
    font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(90deg, #7c6fff, #ff6fff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  #setup .sub { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 28px; }
  #setup .box { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px 18px; width: 100%; max-width: 400px; }
  #setup label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; }
  #setup input {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: var(--text); padding: 14px; font-size: 1rem; outline: none;
    font-family: monospace; -webkit-appearance: none;
  }
  #setup .note { font-size: 0.72rem; color: var(--dim); margin: 10px 0 18px; }
  #setup .err { color: #ff8888; font-size: 0.78rem; margin-top: 8px; }
  #setup button {
    width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #7c6fff, #a06fff); color: #fff;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.02em;
  }

  /* ── Main ── */
  #main { display: none; flex-direction: column; gap: 10px; flex: 1; }
  #main.show { display: flex; }

  .header { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }
  .header h1 {
    font-size: 1.15rem; font-weight: 800;
    background: linear-gradient(90deg, #7c6fff, #ff6fff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub2 { font-size: 0.62rem; color: var(--dim); letter-spacing: 0.07em; }
  .settings-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: #7a7a9a; padding: 7px 13px; font-size: 0.78rem; cursor: pointer;
  }

  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 18px; padding: 14px; }
  .card-tgt { background: var(--tgt-bg); border: 1px solid var(--tgt-border); border-radius: 18px; padding: 14px; }

  .lbl { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  /* Lang switcher row */
  .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .lang-info { flex: 1; text-align: center; }
  .lang-info .flag-label { font-size: 1rem; }
  .swap-btn {
    background: rgba(124,111,255,0.15); border: 1px solid rgba(124,111,255,0.3);
    border-radius: 50%; width: 36px; height: 36px; color: var(--purple);
    font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* Pills */
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05); color: #a0a0c0; font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pill.active { background: linear-gradient(135deg,#7c6fff,#a06fff); border: none; color: #fff; font-weight: 700; }
  .pill.disabled { color: var(--dim); border-color: var(--dim); cursor: default; }
  .pill-section { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }

  /* Text areas */
  .text-display {
    min-height: 60px; font-size: 1.05rem; line-height: 1.65;
    color: #d0d0e8; word-break: break-word;
  }
  .text-display.interim { color: #7070a0; font-style: italic; }
  .text-display.empty { color: var(--dim); font-style: normal; }
  .tgt-text { min-height: 60px; font-size: 1.1rem; line-height: 1.65; color: var(--tgt-text); word-break: break-word; }
  .tgt-text.empty { color: var(--dim); }

  .tgt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .spinner {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--purple); border-top-color: transparent;
    animation: spin 0.7s linear infinite;
  }
  .speak-btn {
    margin-top: 10px; width: 100%;
    background: rgba(124,111,255,0.15); border: 1px solid rgba(124,111,255,0.25);
    border-radius: 10px; color: #9b8fff; padding: 10px; font-size: 0.82rem; cursor: pointer;
  }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
  .toggle-track {
    width: 40px; height: 22px; border-radius: 11px; background: rgba(255,255,255,0.12);
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-track.on { background: var(--purple); }
  .toggle-knob {
    width: 16px; height: 16px; border-radius: 50%; background: #fff;
    position: absolute; top: 3px; left: 3px; transition: left 0.2s;
  }
  .toggle-track.on .toggle-knob { left: 21px; }
  .toggle-label { font-size: 0.82rem; color: var(--muted); }

  /* Mic */
  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 4px 0; }
  .mic-wrap { position: relative; }
  .mic-ripple {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(255,68,102,0.3);
    animation: ripple 1.5s ease-out infinite;
    display: none;
  }
  .mic-ripple.show { display: block; }
  .mic-btn {
    width: 88px; height: 88px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 2.2rem; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #7c6fff, #a06fff);
    box-shadow: 0 0 24px rgba(124,111,255,0.35);
    transition: all 0.2s; position: relative; z-index: 1;
  }
  .mic-btn.active {
    background: linear-gradient(135deg, #ff4466, #ff6655);
    box-shadow: 0 0 32px rgba(255,68,102,0.45);
  }
  .mic-status { font-size: 0.78rem; color: var(--muted); }
  .mic-status.active { color: #ff7788; }

  /* Error */
  .error-box {
    background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.25);
    border-radius: 12px; padding: 10px 14px; color: #ff8888; font-size: 0.82rem; display: none;
  }
  .error-box.show { display: block; }

  /* History */
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
  .history-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.05); }
  .history-meta { font-size: 0.68rem; color: var(--dim); margin-bottom: 4px; }
  .history-src { font-size: 0.88rem; color: #7a7a9a; margin-bottom: 4px; }
  .history-tgt { font-size: 0.9rem; color: #b8afff; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .clear-btn { background: none; border: none; color: var(--muted); font-size: 0.75rem; cursor: pointer; }

  .footer { text-align: center; font-size: 0.62rem; color: #252540; padding-bottom: 4px; }

  @keyframes ripple { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.7);opacity:0} }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- ══ SETUP ══════════════════════════════════════════════ -->
<div id="setup">
  <div class="globe">🌐</div>
  <h1>同時通訳</h1>
  <div class="sub">AI Simultaneous Interpreter</div>
  <div class="box">
    <label for="apiInput">Anthropic APIキー</label>
    <input type="password" id="apiInput" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="err" id="setupErr"></div>
    <div class="note">APIキーはこのページ内のみで使用されます</div>
    <button onclick="startApp()">開始する →</button>
  </div>
</div>

<!-- ══ MAIN ════════════════════════════════════════════════ -->
<div id="main">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>同時通訳</h1>
      <div class="sub2">AI Interpreter</div>
    </div>
    <button class="settings-btn" onclick="goSetup()">⚙️ 設定</button>
  </div>

  <!-- Error -->
  <div class="error-box" id="errBox"></div>

  <!-- Language card -->
  <div class="card">
    <div class="lang-row">
      <div class="lang-info">
        <div class="lbl">認識言語</div>
        <div class="flag-label" id="srcLabel"></div>
      </div>
      <button class="swap-btn" onclick="swapLangs()">⇄</button>
      <div class="lang-info">
        <div class="lbl">翻訳先</div>
        <div class="flag-label" id="tgtLabel"></div>
      </div>
    </div>
    <div class="pill-section">
      <div class="lbl">認識言語を変更</div>
      <div class="pill-group" id="srcPills"></div>
      <div class="lbl" style="margin-top:10px">翻訳先を変更</div>
      <div class="pill-group" id="tgtPills"></div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="card">
    <div class="lbl" id="srcBoxLabel"></div>
    <div class="text-display empty" id="transcriptBox">話した内容がここに表示されます</div>
  </div>

  <!-- Translation -->
  <div class="card-tgt">
    <div class="tgt-header">
      <div class="lbl" id="tgtBoxLabel"></div>
      <div class="spinner" id="spinner" style="display:none"></div>
    </div>
    <div class="tgt-text empty" id="translationBox">翻訳結果がここに表示されます</div>
    <button class="speak-btn" id="speakBtn" style="display:none" onclick="speakTranslation()">🔊 もう一度読み上げ</button>
  </div>

  <!-- Auto-speak toggle -->
  <div class="toggle-row" onclick="toggleAutoSpeak()">
    <div class="toggle-track" id="toggleTrack">
      <div class="toggle-knob"></div>
    </div>
    <span class="toggle-label">翻訳後に自動で読み上げ</span>
  </div>

  <!-- Mic -->
  <div class="mic-area">
    <div class="mic-wrap">
      <div class="mic-ripple" id="ripple"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleListen()">🎙️</button>
    </div>
    <div class="mic-status" id="micStatus">タップして話す</div>
  </div>

  <!-- History -->
  <div class="card" id="historyCard" style="display:none">
    <div class="history-header">
      <div class="lbl">📋 履歴</div>
      <button class="clear-btn" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="footer">Claude claude-sonnet-4-6 · WebKit Speech API</div>
</div>

<script>
const LANGS = [
  { code:"ja-JP", label:"日本語", flag:"🇯🇵" },
  { code:"en-US", label:"English", flag:"🇺🇸" },
  { code:"zh-CN", label:"中文",    flag:"🇨🇳" },
  { code:"ko-KR", label:"한국어",  flag:"🇰🇷" },
  { code:"es-ES", label:"Español", flag:"🇪🇸" },
  { code:"fr-FR", label:"Français",flag:"🇫🇷" },
  { code:"de-DE", label:"Deutsch", flag:"🇩🇪" },
  { code:"pt-BR", label:"Português",flag:"🇧🇷"},
];

let apiKey = "";
let srcIdx = 0, tgtIdx = 1;
let listening = false;
let autoSpeak = true;
let recognition = null;
let active = false;
let buffer = "";
let interimText = "";
let translateTimer = null;
let currentTranslation = "";
let history = [];

// ── Setup ─────────────────────────────────────────────
function startApp() {
  const val = document.getElementById("apiInput").value.trim();
  if (!val.startsWith("sk-ant-")) {
    document.getElementById("setupErr").textContent = "sk-ant- で始まるキーを入力してください";
    return;
  }
  apiKey = val;
  document.getElementById("setup").style.display = "none";
  document.getElementById("main").classList.add("show");
  renderPills();
  updateLabels();
}

function goSetup() {
  stopListening();
  apiKey = "";
  document.getElementById("apiInput").value = "";
  document.getElementById("setupErr").textContent = "";
  document.getElementById("setup").style.display = "flex";
  document.getElementById("main").classList.remove("show");
}

// ── Language ──────────────────────────────────────────
function renderPills() {
  ["src","tgt"].forEach(type => {
    const el = document.getElementById(type + "Pills");
    el.innerHTML = "";
    LANGS.forEach((l, i) => {
      const btn = document.createElement("button");
      btn.className = "pill";
      const isCurrent = type === "src" ? i === srcIdx : i === tgtIdx;
      const isExcluded = type === "src" ? i === tgtIdx : i === srcIdx;
      if (isCurrent) btn.classList.add("active");
      if (isExcluded) btn.classList.add("disabled");
      btn.textContent = l.flag + " " + l.label;
      if (!isExcluded) btn.onclick = () => {
        if (type === "src") { srcIdx = i; buffer = ""; interimText = ""; setTranscript(""); }
        else { tgtIdx = i; setTranslation(""); }
        renderPills(); updateLabels();
      };
      el.appendChild(btn);
    });
  });
}

function updateLabels() {
  const s = LANGS[srcIdx], t = LANGS[tgtIdx];
  document.getElementById("srcLabel").textContent   = s.flag + " " + s.label;
  document.getElementById("tgtLabel").textContent   = t.flag + " " + t.label;
  document.getElementById("srcBoxLabel").textContent = s.flag + " " + s.label + "（音声）";
  document.getElementById("tgtBoxLabel").textContent = t.flag + " " + t.label + "（翻訳）";
}

function swapLangs() {
  [srcIdx, tgtIdx] = [tgtIdx, srcIdx];
  buffer = ""; interimText = "";
  setTranscript(""); setTranslation("");
  renderPills(); updateLabels();
}

// ── Display helpers ───────────────────────────────────
function setTranscript(text, isInterim) {
  const el = document.getElementById("transcriptBox");
  el.className = "text-display";
  if (!text) { el.classList.add("empty"); el.textContent = "話した内容がここに表示されます"; }
  else { if (isInterim) el.classList.add("interim"); el.textContent = text; }
}

function setTranslation(text) {
  currentTranslation = text;
  const el = document.getElementById("translationBox");
  const btn = document.getElementById("speakBtn");
  el.className = "tgt-text";
  if (!text) { el.classList.add("empty"); el.textContent = "翻訳結果がここに表示されます"; btn.style.display = "none"; }
  else { el.textContent = text; btn.style.display = "block"; }
}

function showError(msg) {
  const el = document.getElementById("errBox");
  if (msg) { el.textContent = "⚠️ " + msg; el.classList.add("show"); }
  else { el.classList.remove("show"); }
}

function setBusy(on) {
  document.getElementById("spinner").style.display = on ? "block" : "none";
}

// ── Translation ───────────────────────────────────────
async function translate(text) {
  if (!text.trim() || !apiKey) return;
  setBusy(true); showError("");
  const s = LANGS[srcIdx], t = LANGS[tgtIdx];
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: `You are a simultaneous interpreter. Translate from ${s.label} to ${t.label}. Output ONLY the translated text, nothing else.`,
        messages: [{ role: "user", content: text }],
      }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    const result = (d.content?.[0]?.text || "").trim();
    setTranslation(result);
    addHistory(text, result, s, t);
    if (autoSpeak && result) speakText(result, t.code);
  } catch(e) { showError(e.message); }
  finally { setBusy(false); }
}

// ── Speech Synthesis ──────────────────────────────────
function speakText(text, lang) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 1.0;
  window.speechSynthesis.speak(u);
}

function speakTranslation() {
  if (currentTranslation) speakText(currentTranslation, LANGS[tgtIdx].code);
}

// ── Speech Recognition (iOS対応) ─────────────────────
function toggleListen() {
  if (listening) { stopListening(); }
  else { startListening(); }
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError("音声認識非対応です（Safari 14.5以上が必要）"); return; }
  showError("");
  buffer = ""; interimText = "";
  setTranscript(""); setTranslation("");
  listening = true; active = true;
  setMicUI(true);
  launchRecognition(SR);
}

function launchRecognition(SR) {
  if (!active) return;
  const r = new SR();
  r.lang = LANGS[srcIdx].code;
  r.continuous = false;      // iOS必須
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    let interim = "", final = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    if (interim) {
      interimText = interim;
      setTranscript((buffer ? buffer + " " : "") + interim, true);
    }
    if (final) {
      interimText = "";
      buffer = (buffer + " " + final).trim();
      setTranscript(buffer);
      clearTimeout(translateTimer);
      translateTimer = setTimeout(() => {
        if (buffer.trim()) { translate(buffer); buffer = ""; }
      }, 1000);
    }
  };

  r.onerror = (e) => {
    if (e.error === "no-speech")  { if (active) launchRecognition(SR); return; }
    if (e.error === "aborted")    return;
    showError("音声認識エラー: " + e.error);
    stopListening();
  };

  r.onend = () => { if (active) launchRecognition(SR); };  // 自動再起動

  recognition = r;
  try { r.start(); } catch(_) {}
}

function stopListening() {
  active = false; listening = false;
  clearTimeout(translateTimer);
  try { recognition?.stop(); } catch(_) {}
  setMicUI(false);
  // 残りテキストを翻訳
  if (buffer.trim()) { translate(buffer); buffer = ""; }
}

function setMicUI(on) {
  const btn = document.getElementById("micBtn");
  const ripple = document.getElementById("ripple");
  const status = document.getElementById("micStatus");
  btn.className = "mic-btn" + (on ? " active" : "");
  btn.textContent = on ? "⏹" : "🎙️";
  if (on) ripple.classList.add("show"); else ripple.classList.remove("show");
  status.className = "mic-status" + (on ? " active" : "");
  status.textContent = on ? "🔴 録音中… もう一度タップで停止" : "タップして話す";
}

// ── Toggle ────────────────────────────────────────────
function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  const track = document.getElementById("toggleTrack");
  if (autoSpeak) track.classList.add("on"); else track.classList.remove("on");
}

// 初期状態をオン
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("toggleTrack").classList.add("on");
});

// ── History ───────────────────────────────────────────
function addHistory(src, tgt, sLang, tLang) {
  const now = new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
  history.unshift({ src, tgt, srcFlag: sLang.flag, tgtFlag: tLang.flag, time: now });
  if (history.length > 30) history.pop();
  renderHistory();
}

function renderHistory() {
  const card = document.getElementById("historyCard");
  const list = document.getElementById("historyList");
  if (history.length === 0) { card.style.display = "none"; return; }
  card.style.display = "block";
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="history-meta">${h.srcFlag}→${h.tgtFlag} ${h.time}</div>
      <div class="history-src">${escHtml(h.src)}</div>
      <div class="history-tgt">→ ${escHtml(h.tgt)}</div>
    </div>`).join("");
}

function clearHistory() { history = []; renderHistory(); }

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
